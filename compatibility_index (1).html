<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI相性鑑定</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Hiragino Sans", sans-serif;
    background: #fafaf8; color: #1a1a18;
    min-height: 100vh; padding: 24px 16px 60px;
  }
  .container { max-width: 560px; margin: 0 auto; }
  .header { text-align: center; margin-bottom: 2rem; }
  .header h1 { font-size: 22px; font-weight: 500; margin-bottom: 4px; }
  .header p { font-size: 14px; color: #6b6b64; }

  .person-card {
    background: #fff;
    border: 0.5px solid #e0dfd6;
    border-radius: 12px;
    padding: 20px;
    margin-bottom: 16px;
  }
  .person-title {
    font-size: 15px;
    font-weight: 600;
    margin-bottom: 16px;
    padding-bottom: 10px;
    border-bottom: 0.5px solid #e0dfd6;
  }
  .person-a { color: #A32D2D; }
  .person-b { color: #185FA5; }

  .card-title { font-size: 13px; font-weight: 500; color: #6b6b64; margin-bottom: 10px; }
  .row { display: grid; grid-template-columns: repeat(3,1fr); gap: 10px; margin-bottom: 14px; }
  .field { display: flex; flex-direction: column; gap: 5px; }
  .field label { font-size: 12px; color: #6b6b64; }
  input[type="number"], select, input[type="text"] {
    width: 100%; padding: 9px 12px; font-size: 15px;
    font-family: inherit; border: 0.5px solid #d0cfc6;
    border-radius: 8px; background: #fff; color: #1a1a18; appearance: none;
  }
  .toggle-group { display: flex; gap: 8px; margin-bottom: 14px; }
  .toggle-btn {
    flex: 1; padding: 9px; font-size: 14px; font-family: inherit;
    border: 0.5px solid #d0cfc6; border-radius: 8px;
    background: #fff; color: #6b6b64; cursor: pointer;
  }
  .toggle-btn.active-a { border-color: #A32D2D; background: #FCEBEB; color: #A32D2D; font-weight: 500; }
  .toggle-btn.active-b { border-color: #185FA5; background: #E6F1FB; color: #185FA5; font-weight: 500; }
  .optional-label {
    font-size: 11px; background: #f1efe8; border: 0.5px solid #d0cfc6;
    border-radius: 4px; padding: 1px 6px; color: #6b6b64; margin-left: 6px;
  }
  .cam-btn {
    flex: 1; padding: 9px; font-size: 13px; font-family: inherit;
    border: 0.5px solid #d0cfc6; border-radius: 8px;
    background: #fff; color: #1a1a18; cursor: pointer;
  }
  .cam-btn:hover { background: #f1efe8; }
  .cam-btns { display: flex; gap: 8px; margin-top: 10px; }
  .face-ok { font-size: 13px; color: #3b6d11; margin-top: 8px; display: none; }
  .face-preview { width: 100%; border-radius: 8px; display: none; margin-top: 8px; }

  /* 相性スコア表示 */
  .score-area {
    display: none;
    background: #fff;
    border: 0.5px solid #e0dfd6;
    border-radius: 12px;
    padding: 20px;
    margin-bottom: 16px;
    text-align: center;
  }
  .score-title { font-size: 13px; color: #6b6b64; margin-bottom: 12px; font-weight: 500; }
  .score-main { font-size: 52px; font-weight: 700; color: #1a1a18; line-height: 1; }
  .score-unit { font-size: 20px; color: #6b6b64; }
  .score-bar-wrap { background: #f1efe8; border-radius: 99px; height: 10px; margin: 14px 0 8px; overflow: hidden; }
  .score-bar { height: 100%; border-radius: 99px; background: linear-gradient(90deg, #A32D2D, #185FA5); transition: width 1s ease; }
  .score-categories { display: grid; grid-template-columns: repeat(3,1fr); gap: 8px; margin-top: 14px; }
  .score-cat { background: #f1efe8; border-radius: 8px; padding: 10px 6px; text-align: center; }
  .score-cat-label { font-size: 11px; color: #6b6b64; margin-bottom: 4px; }
  .score-cat-val { font-size: 20px; font-weight: 600; color: #1a1a18; }

  .submit-btn {
    width: 100%; padding: 14px; font-size: 15px; font-family: inherit;
    font-weight: 500; border: 0.5px solid #888780; border-radius: 10px;
    background: #fff; color: #1a1a18; cursor: pointer; margin-bottom: 16px;
  }
  .submit-btn:hover { background: #f1efe8; }
  .submit-btn:active { transform: scale(0.98); }
  .submit-btn:disabled { opacity: 0.45; cursor: not-allowed; transform: none; }

  .result-card { display: none; background: #fff; border: 0.5px solid #e0dfd6; border-radius: 12px; padding: 20px; }
  .result-label { font-size: 13px; font-weight: 500; color: #6b6b64; margin-bottom: 10px; }
  .result-text { font-size: 15px; line-height: 1.85; white-space: pre-wrap; }

  .dots { display: inline-flex; gap: 5px; align-items: center; }
  .dots span { width: 6px; height: 6px; border-radius: 50%; background: #888780; animation: ld 1.2s infinite; }
  .dots span:nth-child(2){animation-delay:.2s} .dots span:nth-child(3){animation-delay:.4s}
  @keyframes ld{0%,80%,100%{opacity:.25;transform:scale(.8)}40%{opacity:1;transform:scale(1)}}

  .vs-divider {
    text-align: center; font-size: 20px; font-weight: 700;
    color: #6b6b64; margin: 4px 0 16px;
  }
  .footer { text-align: center; margin-top: 40px; font-size: 12px; color: #aaa; }
</style>
</head>
<body>
<div class="container">
  <div class="header">
    <h1>💕 AI相性鑑定</h1>
    <p>四柱推命・血液型・顔印象で2人の相性を分析します</p>
  </div>

  <!-- Aさん -->
  <div class="person-card">
    <p class="person-title person-a">🔴 Aさん（あなた）</p>
    <p class="card-title">生年月日</p>
    <div class="row">
      <div class="field"><label>生年</label><input type="number" id="a-year" placeholder="1990" min="1900" max="2010"></div>
      <div class="field"><label>月</label>
        <select id="a-month"><option value="">選択</option>
          <option>1</option><option>2</option><option>3</option><option>4</option>
          <option>5</option><option>6</option><option>7</option><option>8</option>
          <option>9</option><option>10</option><option>11</option><option>12</option>
        </select>
      </div>
      <div class="field"><label>日</label><select id="a-day"><option value="">選択</option></select></div>
    </div>
    <p class="card-title">性別</p>
    <div class="toggle-group">
      <button class="toggle-btn active-a" id="a-male" onclick="selGender('a','male')">男性</button>
      <button class="toggle-btn" id="a-female" onclick="selGender('a','female')">女性</button>
    </div>
    <p class="card-title">血液型</p>
    <div class="toggle-group">
      <button class="toggle-btn" id="a-A" onclick="selBlood('a','A')">A型</button>
      <button class="toggle-btn" id="a-B" onclick="selBlood('a','B')">B型</button>
      <button class="toggle-btn" id="a-O" onclick="selBlood('a','O')">O型</button>
      <button class="toggle-btn" id="a-AB" onclick="selBlood('a','AB')">AB型</button>
    </div>
    <p class="card-title">顔写真 <span class="optional-label">任意</span></p>
    <div id="a-cam-area" style="display:none"><video id="a-video" autoplay playsinline style="width:100%;border-radius:8px;display:block;"></video></div>
    <canvas id="a-canvas" style="display:none"></canvas>
    <img id="a-preview" class="face-preview" alt="Aさんの顔写真">
    <p class="face-ok" id="a-face-ok">✓ 顔写真を取得しました</p>
    <div class="cam-btns">
      <button class="cam-btn" id="a-btn-open" onclick="openCamera('a')">📷 カメラを起動</button>
      <button class="cam-btn" id="a-btn-snap" onclick="takePhoto('a')" style="display:none">撮影</button>
      <button class="cam-btn" id="a-btn-retake" onclick="retake('a')" style="display:none">撮り直し</button>
    </div>
  </div>

  <div class="vs-divider">VS</div>

  <!-- Bさん -->
  <div class="person-card">
    <p class="person-title person-b">🔵 Bさん（相手）</p>
    <p class="card-title">生年月日</p>
    <div class="row">
      <div class="field"><label>生年</label><input type="number" id="b-year" placeholder="1990" min="1900" max="2010"></div>
      <div class="field"><label>月</label>
        <select id="b-month"><option value="">選択</option>
          <option>1</option><option>2</option><option>3</option><option>4</option>
          <option>5</option><option>6</option><option>7</option><option>8</option>
          <option>9</option><option>10</option><option>11</option><option>12</option>
        </select>
      </div>
      <div class="field"><label>日</label><select id="b-day"><option value="">選択</option></select></div>
    </div>
    <p class="card-title">性別</p>
    <div class="toggle-group">
      <button class="toggle-btn active-b" id="b-male" onclick="selGender('b','male')">男性</button>
      <button class="toggle-btn" id="b-female" onclick="selGender('b','female')">女性</button>
    </div>
    <p class="card-title">血液型</p>
    <div class="toggle-group">
      <button class="toggle-btn" id="b-A" onclick="selBlood('b','A')">A型</button>
      <button class="toggle-btn" id="b-B" onclick="selBlood('b','B')">B型</button>
      <button class="toggle-btn" id="b-O" onclick="selBlood('b','O')">O型</button>
      <button class="toggle-btn" id="b-AB" onclick="selBlood('b','AB')">AB型</button>
    </div>
    <p class="card-title">顔写真 <span class="optional-label">任意</span></p>
    <div id="b-cam-area" style="display:none"><video id="b-video" autoplay playsinline style="width:100%;border-radius:8px;display:block;"></video></div>
    <canvas id="b-canvas" style="display:none"></canvas>
    <img id="b-preview" class="face-preview" alt="Bさんの顔写真">
    <p class="face-ok" id="b-face-ok">✓ 顔写真を取得しました</p>
    <div class="cam-btns">
      <button class="cam-btn" id="b-btn-open" onclick="openCamera('b')">📷 カメラを起動</button>
      <button class="cam-btn" id="b-btn-snap" onclick="takePhoto('b')" style="display:none">撮影</button>
      <button class="cam-btn" id="b-btn-retake" onclick="retake('b')" style="display:none">撮り直し</button>
    </div>
  </div>

  <button class="submit-btn" id="submit-btn" onclick="doCompatibility()">💕 相性を鑑定する</button>

  <!-- スコア表示 -->
  <div class="score-area" id="score-area">
    <p class="score-title">総合相性スコア</p>
    <div><span class="score-main" id="score-main">--</span><span class="score-unit">点</span></div>
    <div class="score-bar-wrap"><div class="score-bar" id="score-bar" style="width:0%"></div></div>
    <div class="score-categories">
      <div class="score-cat"><div class="score-cat-label">💕 恋愛</div><div class="score-cat-val" id="score-love">--</div></div>
      <div class="score-cat"><div class="score-cat-label">💼 仕事</div><div class="score-cat-val" id="score-work">--</div></div>
      <div class="score-cat"><div class="score-cat-label">🤝 絆</div><div class="score-cat-val" id="score-bond">--</div></div>
    </div>
  </div>

  <!-- 鑑定結果 -->
  <div class="result-card" id="result-card">
    <p class="result-label">AI相性鑑定結果</p>
    <div class="result-text" id="result-text"></div>
  </div>

  <div class="footer">Powered by AI</div>
</div>

<script>
const JIKKAN=["甲","乙","丙","丁","戊","己","庚","辛","壬","癸"];
const JUNISHI=["子","丑","寅","卯","辰","巳","午","未","申","酉","戌","亥"];
const JIKKAN_EL=["木","木","火","火","土","土","金","金","水","水"];
const JUNISHI_EL=["水","土","木","木","土","火","火","土","金","金","土","水"];

let state = {
  a: { gender:'male', blood:'', image:null, stream:null },
  b: { gender:'male', blood:'', image:null, stream:null }
};

// 日付更新
['a','b'].forEach(p => {
  document.getElementById(`${p}-month`).addEventListener('change', () => updateDays(p));
  document.getElementById(`${p}-year`).addEventListener('change', () => updateDays(p));
});
function updateDays(p) {
  const y = parseInt(document.getElementById(`${p}-year`).value)||2000;
  const m = parseInt(document.getElementById(`${p}-month`).value)||1;
  const days = new Date(y,m,0).getDate();
  const cur = parseInt(document.getElementById(`${p}-day`).value);
  const d = document.getElementById(`${p}-day`);
  d.innerHTML = '<option value="">選択</option>';
  for(let i=1;i<=days;i++){const o=document.createElement('option');o.value=o.textContent=i;if(i===cur)o.selected=true;d.appendChild(o);}
}
updateDays('a'); updateDays('b');

function selGender(p, g) {
  state[p].gender = g;
  const sfx = p==='a' ? 'active-a' : 'active-b';
  document.getElementById(`${p}-male`).classList.toggle(sfx, g==='male');
  document.getElementById(`${p}-female`).classList.toggle(sfx, g==='female');
}
function selBlood(p, b) {
  if(state[p].blood===b){state[p].blood='';document.getElementById(`${p}-${b}`).classList.remove('active-a','active-b');return;}
  if(state[p].blood) document.getElementById(`${p}-${state[p].blood}`).classList.remove('active-a','active-b');
  state[p].blood = b;
  const sfx = p==='a' ? 'active-a' : 'active-b';
  document.getElementById(`${p}-${b}`).classList.add(sfx);
}

async function openCamera(p) {
  try {
    state[p].stream = await navigator.mediaDevices.getUserMedia({video:{facingMode:'user'}});
    document.getElementById(`${p}-video`).srcObject = state[p].stream;
    document.getElementById(`${p}-cam-area`).style.display = 'block';
    document.getElementById(`${p}-btn-open`).style.display = 'none';
    document.getElementById(`${p}-btn-snap`).style.display = '';
    document.getElementById(`${p}-preview`).style.display = 'none';
    document.getElementById(`${p}-face-ok`).style.display = 'none';
    state[p].image = null;
  } catch(e) { alert('カメラへのアクセスが許可されていません。'); }
}
function takePhoto(p) {
  const v = document.getElementById(`${p}-video`);
  const c = document.getElementById(`${p}-canvas`);
  c.width=v.videoWidth; c.height=v.videoHeight;
  c.getContext('2d').drawImage(v,0,0);
  state[p].image = c.toDataURL('image/jpeg',0.8).split(',')[1];
  const prev = document.getElementById(`${p}-preview`);
  prev.src = 'data:image/jpeg;base64,'+state[p].image;
  prev.style.display = 'block';
  document.getElementById(`${p}-cam-area`).style.display = 'none';
  document.getElementById(`${p}-btn-snap`).style.display = 'none';
  document.getElementById(`${p}-btn-retake`).style.display = '';
  document.getElementById(`${p}-face-ok`).style.display = 'block';
  if(state[p].stream) state[p].stream.getTracks().forEach(t=>t.stop());
}
function retake(p) {
  state[p].image = null;
  document.getElementById(`${p}-preview`).style.display = 'none';
  document.getElementById(`${p}-btn-retake`).style.display = 'none';
  document.getElementById(`${p}-face-ok`).style.display = 'none';
  document.getElementById(`${p}-btn-open`).style.display = '';
  openCamera(p);
}

function calcPillar(base) {
  const kan = JIKKAN[((base%10)+10)%10];
  const shi = JUNISHI[((base%12)+12)%12];
  return { kan, shi, kanEl:JIKKAN_EL[JIKKAN.indexOf(kan)], shiEl:JUNISHI_EL[JUNISHI.indexOf(shi)] };
}
function getMeisei(year, month, day) {
  const yb=(year-4)%60;
  const mb=(yb*12+month+1)%60;
  const dd=Math.floor((new Date(year,month-1,day)-new Date(1900,0,1))/86400000+15)%60;
  return [calcPillar(yb), calcPillar(mb), calcPillar(dd)];
}

function animateScore(total, love, work, bond) {
  document.getElementById('score-area').style.display = 'block';
  setTimeout(() => {
    document.getElementById('score-main').textContent = total;
    document.getElementById('score-bar').style.width = total + '%';
    document.getElementById('score-love').textContent = love;
    document.getElementById('score-work').textContent = work;
    document.getElementById('score-bond').textContent = bond;
  }, 100);
}

async function doCompatibility() {
  const ay=parseInt(document.getElementById('a-year').value);
  const am=parseInt(document.getElementById('a-month').value);
  const ad=parseInt(document.getElementById('a-day').value);
  const by=parseInt(document.getElementById('b-year').value);
  const bm=parseInt(document.getElementById('b-month').value);
  const bd=parseInt(document.getElementById('b-day').value);

  if(!ay||!am||!ad||!by||!bm||!bd) { alert('2人の生年月日を入力してください'); return; }

  const btn = document.getElementById('submit-btn');
  btn.disabled = true; btn.textContent = '鑑定中...';

  const aM = getMeisei(ay,am,ad);
  const bM = getMeisei(by,bm,bd);
  const meiA = aM.map((p,i)=>['年柱','月柱','日柱'][i]+`：${p.kan}（${p.kanEl}）・${p.shi}（${p.shiEl}）`).join('\n');
  const meiB = bM.map((p,i)=>['年柱','月柱','日柱'][i]+`：${p.kan}（${p.kanEl}）・${p.shi}（${p.shiEl}）`).join('\n');

  const faceA = state.a.image ? `Aさんの顔写真から雰囲気・印象・エネルギーを読み取り鑑定に反映してください。` : '';
  const faceB = state.b.image ? `Bさんの顔写真から雰囲気・印象・エネルギーを読み取り鑑定に反映してください。` : '';

  const prompt = `あなたは四柱推命・血液型・人相学を統合した相性占いの専門家です。以下の2人のデータをもとに総合相性鑑定を行ってください。

【Aさん】${ay}年${am}月${ad}日生まれ・${state.a.gender==='male'?'男性':'女性'}・${state.a.blood?state.a.blood+'型':'血液型不明'}
【Aさんの命式】
${meiA}
${faceA}

【Bさん】${by}年${bm}月${bd}日生まれ・${state.b.gender==='male'?'男性':'女性'}・${state.b.blood?state.b.blood+'型':'血液型不明'}
【Bさんの命式】
${meiB}
${faceB}

以下の形式でJSONのみを返してください（他のテキストは不要）：
{
  "total": 総合相性スコア(0-100の整数),
  "love": 恋愛相性スコア(0-100の整数),
  "work": 仕事相性スコア(0-100の整数),
  "bond": 絆スコア(0-100の整数),
  "reading": "700〜900字の詳細な相性鑑定文。恋愛・仕事・絆それぞれの相性と、2人が良い関係を築くためのアドバイスを温かく前向きに書いてください。"
}`;

  const resultCard = document.getElementById('result-card');
  const resultText = document.getElementById('result-text');
  resultCard.style.display = 'block';
  resultText.innerHTML = '<div class="dots"><span></span><span></span><span></span></div>';

  try {
    const content = [];
    if(state.a.image) content.push({type:'image_url',image_url:{url:`data:image/jpeg;base64,${state.a.image}`}});
    if(state.b.image) content.push({type:'image_url',image_url:{url:`data:image/jpeg;base64,${state.b.image}`}});
    content.push({type:'text',text:prompt});

    const res = await fetch('/api/compatibility', {
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body: JSON.stringify({ content })
    });
    const data = await res.json();
    const text = data.content?.[0]?.text || '{}';
    const clean = text.replace(/```json|```/g,'').trim();
    const result = JSON.parse(clean);

    animateScore(result.total, result.love, result.work, result.bond);
    resultText.textContent = result.reading || '鑑定結果を取得できませんでした。';
  } catch(e) {
    resultText.textContent = '接続エラーが発生しました。もう一度お試しください。';
  }

  btn.disabled = false; btn.textContent = '💕 もう一度鑑定する';
}
</script>
</body>
</html>
